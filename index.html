<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comparativos — Qive</title>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@200;300;400;500;700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#141517;
    color:#E6E7EA;
    font-family:'Lexend', Arial, Helvetica, sans-serif;
    min-height:100vh;
  }

  .header {
    position:relative;
    padding:56px 40px 40px;
    overflow:hidden;
    border-bottom:1px solid #2C2D30;
  }
  .header-accent {
    position:absolute;
    top:0; right:0;
    height:100%;
    opacity:0.9;
  }
  .kicker {
    font-weight:500;
    font-size:13px;
    letter-spacing:2px;
    text-transform:uppercase;
    color:#FB653D;
    margin-bottom:12px;
  }
  h1 {
    font-weight:300;
    font-size:36px;
    color:#FFFFFF;
    position:relative;
    z-index:1;
  }
  .subtitle {
    font-weight:400;
    font-size:15px;
    color:#9A9DA1;
    margin-top:10px;
    max-width:520px;
    position:relative;
    z-index:1;
  }

  .container {
    max-width:960px;
    margin:0 auto;
    padding:32px 40px 80px;
  }

  .list {
    border-top:1px solid #2C2D30;
  }

  .row {
    display:flex;
    align-items:center;
    gap:24px;
    padding:22px 8px;
    border-bottom:1px solid #2C2D30;
    text-decoration:none;
    color:inherit;
    transition:background 0.15s ease;
  }
  .row:hover {
    background:#1B1C1F;
  }

  .row-tail {
    flex-shrink:0;
    width:4px;
    height:36px;
    background:#FF4719;
    transform:skewX(-18deg);
    opacity:0.85;
  }

  .row-main {
    flex:1;
    min-width:0;
  }
  .row-name {
    font-weight:400;
    font-size:17px;
    color:#FFFFFF;
    margin-bottom:4px;
  }
  .row-meta {
    display:flex;
    gap:16px;
    font-size:13px;
    color:#7D8083;
  }

  .badge {
    flex-shrink:0;
    font-weight:500;
    font-size:12px;
    letter-spacing:0.5px;
    text-transform:uppercase;
    padding:6px 14px;
    border-radius:20px;
    background:#F3F4F8;
    color:#141517;
    white-space:nowrap;
  }

  .date {
    flex-shrink:0;
    font-weight:400;
    font-size:13px;
    color:#B2B4B6;
    width:90px;
    text-align:right;
  }

  .arrow {
    flex-shrink:0;
    color:#63666A;
    font-size:18px;
  }

  .empty-note {
    padding:40px 8px;
    color:#63666A;
    font-size:14px;
    font-style:italic;
  }

  /* Tela de bloqueio */
  #lock-screen {
    position:fixed;
    inset:0;
    background:#141517;
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:1000;
    padding:20px;
  }
  .lock-box {
    width:100%;
    max-width:340px;
    text-align:center;
  }
  .lock-tail {
    width:44px;
    height:44px;
    margin:0 auto 24px;
    background:#FF4719;
    transform:skewX(-18deg);
    opacity:0.9;
  }
  .lock-title {
    font-weight:300;
    font-size:22px;
    color:#FFFFFF;
    margin-bottom:8px;
  }
  .lock-subtitle {
    font-weight:400;
    font-size:13px;
    color:#7D8083;
    margin-bottom:28px;
  }
  #lock-input {
    width:100%;
    background:#1B1C1F;
    border:1px solid #2C2D30;
    border-radius:8px;
    padding:14px 16px;
    font-family:'Lexend', Arial, Helvetica, sans-serif;
    font-size:18px;
    letter-spacing:4px;
    text-align:center;
    color:#FFFFFF;
    outline:none;
    margin-bottom:16px;
  }
  #lock-input:focus {
    border-color:#FF4719;
  }
  #lock-submit {
    width:100%;
    background:#FF4719;
    border:none;
    border-radius:8px;
    padding:14px 16px;
    font-family:'Lexend', Arial, Helvetica, sans-serif;
    font-weight:500;
    font-size:14px;
    letter-spacing:0.5px;
    text-transform:uppercase;
    color:#FFFFFF;
    cursor:pointer;
    transition:background 0.15s ease;
  }
  #lock-submit:hover {
    background:#D13200;
  }
  #lock-error {
    color:#FF4719;
    font-size:13px;
    margin-top:14px;
    display:none;
  }

  #site-content {
    display:none;
  }

  @media (max-width: 640px) {
    .header { padding:40px 20px 28px; }
    .container { padding:24px 20px 60px; }
    h1 { font-size:28px; }
    .row { flex-wrap:wrap; gap:8px 16px; }
    .row-meta { flex-wrap:wrap; }
    .date { width:auto; text-align:left; order:3; }
  }
</style>
</head>
<body>

<div id="lock-screen">
  <div class="lock-box">
    <div class="lock-tail"></div>
    <div class="lock-title">Comparativos</div>
    <div class="lock-subtitle">Acesso restrito — digite a senha</div>
    <input type="password" id="lock-input" maxlength="10" inputmode="numeric" placeholder="••••••" autofocus>
    <button id="lock-submit">Entrar</button>
    <div id="lock-error">Senha incorreta. Tente novamente.</div>
  </div>
</div>

<div id="site-content">

<div class="header">
  <svg class="header-accent" width="220" height="100%" viewBox="0 0 220 300" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
    <polygon points="120,0 190,0 100,300 30,300" fill="#FF4719" opacity="0.12"/>
    <polygon points="170,60 220,60 140,300 90,300" fill="#FF4719" opacity="0.08"/>
  </svg>
  <div class="kicker">Growth Marketing · Qive</div>
  <h1>Comparativos</h1>
  <p class="subtitle">Análises de resultados e testes A/B de campanhas.</p>
</div>

<div class="container">
  <div class="list" id="analysis-list">

    <a class="row" href="whatsapp-gtm-grt.html">
      <div class="row-tail"></div>
      <div class="row-main">
        <div class="row-name">WhatsApp GTM — Gestão da Reforma Tributária</div>
        <div class="row-meta">
          <span>Canal: WhatsApp</span>
        </div>
      </div>
      <span class="badge">WhatsApp</span>
      <span class="date">Jul 2026</span>
      <span class="arrow">→</span>
    </a>

    <!-- Para adicionar uma nova análise, copie o bloco <a class="row">...</a> acima,
         ajuste o href, o nome, o canal e a data. -->

  </div>
</div>

</div>

<script>
  (function () {
    var CORRECT_PIN = "478569";
    var STORAGE_KEY = "comparativos_auth";

    var lockScreen = document.getElementById("lock-screen");
    var siteContent = document.getElementById("site-content");
    var input = document.getElementById("lock-input");
    var submit = document.getElementById("lock-submit");
    var errorMsg = document.getElementById("lock-error");

    function unlock() {
      lockScreen.style.display = "none";
      siteContent.style.display = "block";
    }

    function tryUnlock() {
      if (input.value === CORRECT_PIN) {
        localStorage.setItem(STORAGE_KEY, "true");
        unlock();
      } else {
        errorMsg.style.display = "block";
        input.value = "";
        input.focus();
      }
    }

    if (localStorage.getItem(STORAGE_KEY) === "true") {
      unlock();
    }

    submit.addEventListener("click", tryUnlock);
    input.addEventListener("keydown", function (e) {
      if (e.key === "Enter") tryUnlock();
    });
  })();
</script>

</body>
</html>
