name: Gerar páginas de comparativos

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'index.html'
      - '**/index.html'
      - '.github/workflows/**'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Gerar páginas (build.js)
        run: node build.js

      - name: Commitar páginas geradas
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: atualiza páginas de comparativos automaticamente"
          file_pattern: "index.html */index.html"
